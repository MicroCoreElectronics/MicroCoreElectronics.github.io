<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 82" width="320" height="82">

  <!-- Chip body -->
  <rect x="16" y="11" width="50" height="50" rx="5" fill="#0d1b2a"/>
  <rect x="16" y="11" width="50" height="50" rx="5" fill="none" stroke="#00b4d8" stroke-width="1.8"/>

  <!-- Inner circuit traces -->
  <line x1="29" y1="24" x2="53" y2="24" stroke="#00b4d8" stroke-width="1" opacity="0.5"/>
  <line x1="29" y1="36" x2="53" y2="36" stroke="#00b4d8" stroke-width="1" opacity="0.5"/>
  <line x1="29" y1="48" x2="53" y2="48" stroke="#00b4d8" stroke-width="1" opacity="0.5"/>
  <line x1="29" y1="24" x2="29" y2="48" stroke="#00b4d8" stroke-width="1" opacity="0.5"/>
  <line x1="41" y1="24" x2="41" y2="48" stroke="#00b4d8" stroke-width="1" opacity="0.5"/>
  <line x1="53" y1="24" x2="53" y2="48" stroke="#00b4d8" stroke-width="1" opacity="0.5"/>

  <!-- Node dots -->
  <circle cx="29" cy="36" r="2.8" fill="#00b4d8"/>
  <circle cx="41" cy="36" r="2.8" fill="#00b4d8"/>
  <circle cx="53" cy="36" r="2.8" fill="#00b4d8"/>
  <circle cx="41" cy="24" r="1.8" fill="#00b4d8" opacity="0.7"/>
  <circle cx="41" cy="48" r="1.8" fill="#00b4d8" opacity="0.7"/>

  <!-- Pins left -->
  <line x1="4"  y1="20" x2="16" y2="20" stroke="#00b4d8" stroke-width="2" stroke-linecap="round"/>
  <line x1="4"  y1="31" x2="16" y2="31" stroke="#00b4d8" stroke-width="2" stroke-linecap="round"/>
  <line x1="4"  y1="42" x2="16" y2="42" stroke="#00b4d8" stroke-width="2" stroke-linecap="round"/>
  <line x1="4"  y1="52" x2="16" y2="52" stroke="#00b4d8" stroke-width="2" stroke-linecap="round"/>

  <!-- Pins right -->
  <line x1="66" y1="20" x2="78" y2="20" stroke="#00b4d8" stroke-width="2" stroke-linecap="round"/>
  <line x1="66" y1="31" x2="78" y2="31" stroke="#00b4d8" stroke-width="2" stroke-linecap="round"/>
  <line x1="66" y1="42" x2="78" y2="42" stroke="#00b4d8" stroke-width="2" stroke-linecap="round"/>
  <line x1="66" y1="52" x2="78" y2="52" stroke="#00b4d8" stroke-width="2" stroke-linecap="round"/>

  <!-- Pins top -->
  <line x1="28" y1="3"  x2="28" y2="11" stroke="#00b4d8" stroke-width="2" stroke-linecap="round"/>
  <line x1="41" y1="3"  x2="41" y2="11" stroke="#00b4d8" stroke-width="2" stroke-linecap="round"/>
  <line x1="54" y1="3"  x2="54" y2="11" stroke="#00b4d8" stroke-width="2" stroke-linecap="round"/>

  <!-- Pins bottom -->
  <line x1="28" y1="61" x2="28" y2="70" stroke="#00b4d8" stroke-width="2" stroke-linecap="round"/>
  <line x1="41" y1="61" x2="41" y2="70" stroke="#00b4d8" stroke-width="2" stroke-linecap="round"/>
  <line x1="54" y1="61" x2="54" y2="70" stroke="#00b4d8" stroke-width="2" stroke-linecap="round"/>

  <!-- Company name -->
  <text x="92" y="46" font-family="Arial Black, Arial, sans-serif" font-size="27" font-weight="900" letter-spacing="-0.5">
    <tspan fill="#0d1b2a">Micro</tspan><tspan fill="#00b4d8">Core</tspan>
  </text>
  <text x="94" y="64" font-family="Arial, sans-serif" font-size="11" fill="#7a8fa8" letter-spacing="5">ELECTRONICS</text>

</svg>
